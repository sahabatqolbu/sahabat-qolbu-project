<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Detail Paket Umroh - Sahabat Qolbu</title>
  <meta name="description" content="Detail paket umroh Sahabat Qolbu dari database resmi.">
  <link rel="icon" type="image/png" href="/landing/images/icon.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: "#0A2C45",
            secondary: "#133C5A",
            gold: "#FFC107",
            "gold-soft": "#FFF4CC"
          }
        }
      }
    };
  </script>
  <style>
    body {
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 12% 8%, rgba(255, 193, 7, 0.18), transparent 32rem),
        linear-gradient(180deg, #f8fafc 0%, #eef3f7 100%);
    }
    .hero-mesh {
      background:
        radial-gradient(circle at 18% 20%, rgba(255, 193, 7, 0.28), transparent 24rem),
        radial-gradient(circle at 88% 18%, rgba(255, 255, 255, 0.14), transparent 20rem),
        linear-gradient(135deg, #0A2C45 0%, #061A2A 100%);
    }
    .detail-card {
      box-shadow: 0 24px 70px rgba(10, 44, 69, 0.14);
    }
  </style>
</head>
<body class="min-h-screen text-primary">
  <header class="sticky top-0 z-50 bg-primary shadow-lg">
    <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
      <nav class="flex h-16 items-center justify-between md:h-20">
        <a href="/landing/" class="flex items-center gap-3">
          <img src="/landing/images/icon.png" alt="Logo Sahabat Qolbu" class="h-10 w-10 object-contain md:h-12 md:w-12">
          <div>
            <span class="text-lg font-bold md:text-xl">
              <span class="text-white">Sahabat</span>
              <span class="text-gold">Qolbu</span>
            </span>
            <span class="hidden text-xs text-white/70 sm:block">Cahaya Baitullah</span>
          </div>
        </a>
        <div class="flex items-center gap-3">
          <a href="/landing/paket" class="rounded-full border border-white/20 px-4 py-2 text-sm font-semibold text-white hover:bg-white/10">Semua Paket</a>
          <a id="header-wa" href="https://wa.me/6281255871984" target="_blank" rel="noopener noreferrer" class="hidden rounded-full bg-gold px-5 py-2.5 text-sm font-bold text-primary hover:opacity-90 sm:inline-flex">Konsultasi</a>
        </div>
      </nav>
    </div>
  </header>

  <main id="app">
    <section class="mx-auto max-w-7xl px-4 py-10 sm:px-6 lg:px-8">
      <div class="rounded-[2rem] bg-white p-8 text-center detail-card">
        <div class="mx-auto h-10 w-10 animate-spin rounded-full border-4 border-gold border-t-transparent"></div>
        <p class="mt-4 font-semibold text-primary">Memuat detail paket dari database...</p>
      </div>
    </section>
  </main>

  <script>
    (function () {
      const WA_NUMBER = "6281255871984";
      const fallbackImg = "https://images.unsplash.com/photo-1591604129939-f1efa4d9f7fa?w=1200&q=80";
      const app = document.getElementById("app");

      function normalizeApiBase(value) {
        return String(value || "").trim().replace(/\/+$/, "");
      }

      function resolveApiBase() {
        const fromWindow = normalizeApiBase(window.SQ_API_BASE);
        if (fromWindow) return fromWindow;

        const hostname = window.location.hostname;
        if (hostname === "localhost" || hostname === "127.0.0.1") {
          return "http://localhost:5000/api";
        }

        return "https://api.sahabatqolbu.com/api";
      }

      const apiBase = resolveApiBase();
      const serverBase = apiBase.replace(/\/api$/, "");

      function escapeHtml(value) {
        return String(value ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      function resolveImageUrl(path) {
        if (!path) return fallbackImg;
        if (path.startsWith("http://") || path.startsWith("https://")) return path;
        if (path.startsWith("//")) return `https:${path}`;
        return `${serverBase}${path.startsWith("/") ? path : `/${path}`}`;
      }

      function parseList(value) {
        if (Array.isArray(value)) return value.map(String).filter(Boolean);
        const text = String(value || "").trim();
        if (!text) return [];

        try {
          const parsed = JSON.parse(text);
          if (Array.isArray(parsed)) return parsed.map(String).filter(Boolean);
        } catch {}

        return text
          .split(/\r?\n|;|•/)
          .map((item) => item.replace(/^[-*\s]+/, "").trim())
          .filter(Boolean);
      }

      function formatCurrency(value) {
        const number = Number.parseFloat(String(value || "0"));
        return new Intl.NumberFormat("id-ID", {
          style: "currency",
          currency: "IDR",
          maximumFractionDigits: 0
        }).format(Number.isFinite(number) ? number : 0);
      }

      function formatDate(value, long = false) {
        if (!value) return "Jadwal menyusul";
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return "Jadwal menyusul";
        return new Intl.DateTimeFormat("id-ID", {
          day: "2-digit",
          month: long ? "long" : "short",
          year: "numeric"
        }).format(date);
      }

      function getPackageId() {
        const params = new URLSearchParams(window.location.search);
        const id = Number.parseInt(params.get("id") || "", 10);
        return Number.isFinite(id) && id > 0 ? id : null;
      }

      function createWhatsappLink(name) {
        const message = `Assalamualaikum, saya lihat di website sahabatqolbu.com dan ingin konsultasi detail paket ${name}`;
        return `https://wa.me/${WA_NUMBER}?text=${encodeURIComponent(message)}`;
      }

      function listMarkup(items) {
        if (!items.length) return "";
        return items
          .map((item) => `
            <div class="flex gap-3 rounded-2xl bg-slate-50 p-3">
              <span class="mt-0.5 flex h-5 w-5 flex-none items-center justify-center rounded-full bg-green-500 text-xs text-white">✓</span>
              <span class="text-sm font-medium text-slate-700">${escapeHtml(item)}</span>
            </div>
          `)
          .join("");
      }

      function renderError(message) {
        app.innerHTML = `
          <section class="mx-auto max-w-3xl px-4 py-14 text-center sm:px-6 lg:px-8">
            <div class="rounded-[2rem] bg-white p-8 detail-card">
              <p class="text-sm font-black uppercase tracking-[0.22em] text-gold">Paket tidak tersedia</p>
              <h1 class="mt-3 text-3xl font-black text-primary">Detail Paket Tidak Ditemukan</h1>
              <p class="mt-3 text-slate-600">${escapeHtml(message)}</p>
              <a href="/landing/paket" class="mt-8 inline-flex rounded-full bg-primary px-6 py-3 font-bold text-white">Kembali ke Semua Paket</a>
            </div>
          </section>
        `;
      }

      function renderPackage(pkg) {
        const images = Array.isArray(pkg.images)
          ? pkg.images.map((img) => resolveImageUrl(typeof img === "string" ? img : img && img.imageUrl)).filter(Boolean)
          : [];
        const heroImage = images[0] || fallbackImg;
        const seatsLeft = Math.max(Number(pkg.totalSeats || 0) - Number(pkg.bookedSeats || 0), 0);
        const facilities = parseList(pkg.facilities);
        const notes = parseList(pkg.notes);
        const waLink = createWhatsappLink(pkg.name || "Paket Umroh");
        const dateRange = pkg.returnDate
          ? `${formatDate(pkg.departureDate, true)} - ${formatDate(pkg.returnDate, true)}`
          : formatDate(pkg.departureDate, true);

        document.title = `${pkg.name || "Detail Paket"} - Sahabat Qolbu`;
        document.getElementById("header-wa").setAttribute("href", waLink);

        app.innerHTML = `
          <section class="hero-mesh text-white">
            <div class="mx-auto grid max-w-7xl gap-8 px-4 py-10 sm:px-6 lg:grid-cols-[1.05fr_0.95fr] lg:px-8 lg:py-16">
              <div>
                <a href="/landing/paket" class="mb-8 inline-flex items-center gap-2 rounded-full border border-white/20 bg-white/10 px-4 py-2 text-sm font-bold text-white hover:bg-white/20">← Kembali ke Semua Paket</a>
                <div class="mb-5 inline-flex rounded-full bg-gold px-4 py-2 text-xs font-black uppercase tracking-[0.18em] text-primary">Data dari database</div>
                <h1 class="max-w-4xl text-4xl font-black leading-tight sm:text-5xl lg:text-6xl">${escapeHtml(pkg.name || "Paket Umroh")}</h1>
                <p class="mt-5 max-w-2xl text-lg leading-relaxed text-white/75">${escapeHtml(pkg.description || "Detail paket akan diinformasikan oleh tim Sahabat Qolbu.")}</p>
                <div class="mt-8 grid gap-3 sm:grid-cols-3">
                  <div class="rounded-2xl border border-white/15 bg-white/10 p-4 backdrop-blur">
                    <p class="text-xs font-bold uppercase tracking-[0.18em] text-white/55">Berangkat</p>
                    <p class="mt-2 font-bold">${escapeHtml(formatDate(pkg.departureDate))}</p>
                  </div>
                  <div class="rounded-2xl border border-white/15 bg-white/10 p-4 backdrop-blur">
                    <p class="text-xs font-bold uppercase tracking-[0.18em] text-white/55">Durasi</p>
                    <p class="mt-2 font-bold">${escapeHtml(pkg.duration || "-")} Hari</p>
                  </div>
                  <div class="rounded-2xl border border-white/15 bg-white/10 p-4 backdrop-blur">
                    <p class="text-xs font-bold uppercase tracking-[0.18em] text-white/55">Seat</p>
                    <p class="mt-2 font-bold">${seatsLeft} Tersisa</p>
                  </div>
                </div>
              </div>
              <div class="rounded-[2rem] border border-white/15 bg-white/10 p-3 shadow-2xl shadow-black/30 backdrop-blur">
                <img src="${escapeHtml(heroImage)}" alt="${escapeHtml(pkg.name || "Paket Umroh")}" class="aspect-[4/3] w-full rounded-[1.45rem] object-cover" onerror="this.src='${fallbackImg}'">
              </div>
            </div>
          </section>

          <section class="mx-auto grid max-w-7xl gap-8 px-4 py-10 sm:px-6 lg:grid-cols-[1fr_380px] lg:px-8 lg:py-14">
            <div class="space-y-8">
              ${images.length > 1 ? `
                <div class="grid gap-3 rounded-[2rem] bg-white p-4 detail-card sm:grid-cols-3">
                  ${images.slice(0, 6).map((image, index) => `<img src="${escapeHtml(image)}" alt="Galeri ${index + 1}" class="aspect-[4/3] w-full rounded-2xl object-cover" onerror="this.src='${fallbackImg}'">`).join("")}
                </div>
              ` : ""}

              <div class="rounded-[2rem] bg-white p-6 detail-card">
                <h2 class="text-2xl font-black text-primary">Ringkasan Paket</h2>
                <div class="mt-5 grid gap-4 md:grid-cols-2">
                  <div class="rounded-2xl bg-slate-50 p-4">
                    <p class="text-sm font-semibold text-slate-500">Kode Paket</p>
                    <p class="mt-1 font-bold">${escapeHtml(pkg.code || `PKG-${pkg.id}`)}</p>
                  </div>
                  <div class="rounded-2xl bg-slate-50 p-4">
                    <p class="text-sm font-semibold text-slate-500">Tanggal</p>
                    <p class="mt-1 font-bold">${escapeHtml(dateRange)}</p>
                  </div>
                  <div class="rounded-2xl bg-slate-50 p-4">
                    <p class="text-sm font-semibold text-slate-500">Maskapai</p>
                    <p class="mt-1 font-bold">${escapeHtml((pkg.airline && pkg.airline.name) || "Maskapai menyusul")}</p>
                  </div>
                  <div class="rounded-2xl bg-slate-50 p-4">
                    <p class="text-sm font-semibold text-slate-500">Tipe</p>
                    <p class="mt-1 font-bold">${escapeHtml(pkg.type || "Paket Umroh")}</p>
                  </div>
                </div>
              </div>

              <div class="grid gap-5 md:grid-cols-2">
                <div class="rounded-[2rem] bg-white p-6 detail-card">
                  <p class="text-sm font-semibold text-slate-500">Hotel Makkah</p>
                  <h3 class="mt-1 text-xl font-black">${escapeHtml((pkg.hotelMakkah && pkg.hotelMakkah.name) || "Hotel Makkah menyusul")}</h3>
                </div>
                <div class="rounded-[2rem] bg-white p-6 detail-card">
                  <p class="text-sm font-semibold text-slate-500">Hotel Madinah</p>
                  <h3 class="mt-1 text-xl font-black">${escapeHtml((pkg.hotelMadinah && pkg.hotelMadinah.name) || "Hotel Madinah menyusul")}</h3>
                </div>
              </div>

              ${facilities.length ? `
                <div class="rounded-[2rem] bg-white p-6 detail-card">
                  <h2 class="text-2xl font-black text-primary">Fasilitas Termasuk</h2>
                  <div class="mt-5 grid gap-3 sm:grid-cols-2">${listMarkup(facilities)}</div>
                </div>
              ` : ""}

              ${notes.length ? `
                <div class="rounded-[2rem] bg-white p-6 detail-card">
                  <h2 class="text-2xl font-black text-primary">Catatan Paket</h2>
                  <div class="mt-5 grid gap-3">${listMarkup(notes)}</div>
                </div>
              ` : ""}
            </div>

            <aside class="lg:sticky lg:top-28 lg:self-start">
              <div class="rounded-[2rem] bg-white p-6 detail-card">
                <p class="text-sm font-semibold text-slate-500">Harga mulai dari</p>
                <p class="mt-2 text-4xl font-black text-primary">${formatCurrency(pkg.discountPrice || pkg.price)}</p>
                <p class="mt-1 text-sm text-slate-500">per jamaah, sesuai ketersediaan kamar</p>
                <div class="mt-6 grid gap-3">
                  <a href="${waLink}" target="_blank" rel="noopener noreferrer" class="inline-flex items-center justify-center rounded-2xl bg-green-500 px-5 py-4 font-bold text-white hover:bg-green-600">Tanya Paket Ini</a>
                  ${pkg.itineraryPdf ? `<a href="${escapeHtml(resolveImageUrl(pkg.itineraryPdf))}" target="_blank" rel="noopener noreferrer" class="inline-flex items-center justify-center rounded-2xl bg-primary px-5 py-4 font-bold text-white hover:bg-secondary">Lihat Itinerary PDF</a>` : ""}
                </div>
              </div>
            </aside>
          </section>
        `;
      }

      async function boot() {
        const id = getPackageId();
        if (!id) {
          renderError("ID paket tidak valid.");
          return;
        }

        try {
          const response = await fetch(`${apiBase}/packages/${id}`, {
            headers: { Accept: "application/json" }
          });

          if (!response.ok) {
            renderError("Paket tidak ditemukan atau belum dipublikasikan.");
            return;
          }

          const payload = await response.json();
          if (!payload || !payload.success || !payload.data) {
            renderError("Response detail paket tidak valid.");
            return;
          }

          renderPackage(payload.data);
        } catch (error) {
          renderError("Gagal memuat data paket. Coba refresh halaman atau hubungi admin.");
        }
      }

      boot();
    })();
  </script>
</body>
</html>
