name: Deploy Backend to cPanel

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      HAS_DB_TEST_CONFIG: ${{ secrets.DB_TEST_HOST != '' && secrets.DB_TEST_USER != '' && secrets.DB_TEST_NAME != '' }}
      HAS_BACKEND_HEALTHCHECK_URL: ${{ secrets.BACKEND_HEALTHCHECK_URL != '' }}
      HAS_BACKEND_SMOKE_BASE_URL: ${{ secrets.BACKEND_SMOKE_BASE_URL != '' }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: |
          cd backend
          npm ci

      - name: Run runbook compliance check
        run: |
          cd backend
          npm run check:runbook

      - name: Run migration compliance check
        run: |
          cd backend
          npm run check:migrations

      - name: Run API contract compliance check
        run: |
          cd backend
          npm run check:api-contract

      - name: Run PII governance check
        run: |
          cd backend
          npm run check:pii-governance

      - name: Run backend tests
        run: |
          cd backend
          npm test
        env:
          JWT_SECRET: ci-test-jwt-secret-0123456789abcdef
          NODE_ENV: test

      - name: Run backend DB integration tests (optional)
        if: env.HAS_DB_TEST_CONFIG == 'true'
        run: |
          cd backend
          npm run test:db-integration
        env:
          ENABLE_DB_INTEGRATION_TESTS: "true"
          DB_HOST: ${{ secrets.DB_TEST_HOST }}
          DB_PORT: ${{ secrets.DB_TEST_PORT || '3306' }}
          DB_USER: ${{ secrets.DB_TEST_USER }}
          DB_PASSWORD: ${{ secrets.DB_TEST_PASSWORD }}
          DB_NAME: ${{ secrets.DB_TEST_NAME }}
          NODE_ENV: test

      - name: Upload backend via SFTP
        uses: appleboy/scp-action@v0.1.7
        with:
            host: ${{ secrets.SSH_HOST }}
            username: ${{ secrets.SSH_USERNAME }}
            key: ${{ secrets.SSH_PRIVATE_KEY }}
            port: ${{ secrets.SSH_PORT || secrets.PORT || '22' }}
            source: "backend/*"
            target: ${{ secrets.BACKEND_DEPLOY_TARGET || secrets.DEPLOY_BACKEND_CPANEL }}

      - name: Optional backend health check
        if: env.HAS_BACKEND_HEALTHCHECK_URL == 'true'
        run: |
          curl --fail --show-error --silent "${{ secrets.BACKEND_HEALTHCHECK_URL }}"

      - name: Optional backend smoke check
        if: env.HAS_BACKEND_SMOKE_BASE_URL == 'true'
        run: |
          cd backend
          SMOKE_BASE_URL="${{ secrets.BACKEND_SMOKE_BASE_URL }}" SMOKE_AUTH_COOKIE="${{ secrets.BACKEND_SMOKE_AUTH_COOKIE }}" npm run smoke
