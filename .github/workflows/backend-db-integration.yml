name: Backend DB Integration Tests

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/backend-db-integration.yml"

jobs:
  db-integration:
    if: ${{ secrets.DB_TEST_HOST != '' && secrets.DB_TEST_USER != '' && secrets.DB_TEST_NAME != '' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: |
          cd backend
          npm ci

      - name: Run DB integration tests
        run: |
          cd backend
          npm run test:db-integration
        env:
          ENABLE_DB_INTEGRATION_TESTS: "true"
          DB_HOST: ${{ secrets.DB_TEST_HOST }}
          DB_PORT: ${{ secrets.DB_TEST_PORT || '3306' }}
          DB_USER: ${{ secrets.DB_TEST_USER }}
          DB_PASSWORD: ${{ secrets.DB_TEST_PASSWORD }}
          DB_NAME: ${{ secrets.DB_TEST_NAME }}
          NODE_ENV: test
